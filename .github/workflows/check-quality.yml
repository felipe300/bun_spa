name: Quality Check

on:
  workflow_call:
  pull_request:

jobs:
  lint-and-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Run Oxlint (The Fast One)
        run: bun run lint

      - name: Check Format
        run: bun run fix

      - name: Run Integration Tests
        run: bun test
