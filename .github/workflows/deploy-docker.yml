name: Deploy Docker

on:
  workflow_call:

jobs:
  push-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: spa-dist
          path: dist/

      - name: Build Docker Image
        run: |
          docker build -t bun-spa-app:latest .
